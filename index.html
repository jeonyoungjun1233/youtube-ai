<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="졸릴 때 누르는 쇼츠용 졸음방지 귀신 버튼"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="졸음방지 귀신 버튼" />
    <meta property="og:title" content="졸음방지 귀신 버튼" />
    <meta property="og:description" content="여기를 눌러 링크를 확인하세요." />
    <meta property="og:url" content="https://youtube-ai-inky.vercel.app/" />
    <meta
      property="og:image"
      content="https://youtube-ai-inky.vercel.app/assets/share-preview.png?v=2"
    />
    <meta
      property="og:image:secure_url"
      content="https://youtube-ai-inky.vercel.app/assets/share-preview.png?v=2"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="졸리세요? 졸리면 클릭" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="졸음방지 귀신 버튼" />
    <meta
      name="twitter:description"
      content="여기를 눌러 링크를 확인하세요."
    />
    <meta
      name="twitter:image"
      content="https://youtube-ai-inky.vercel.app/assets/share-preview.png?v=2"
    />
    <link
      rel="image_src"
      href="https://youtube-ai-inky.vercel.app/assets/share-preview.png?v=2"
    />
    <title>졸음방지 귀신 버튼</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- shorts-shell은 유튜브 쇼츠처럼 세로 화면을 가운데에 잡아주는 바깥 영역입니다. -->
    <main class="shorts-shell" aria-label="졸음방지 귀신 버튼">
      <!-- stage 안에서 모든 화면 연출이 일어납니다. -->
      <section id="stage" class="stage is-idle">
        <div class="ambient-lines" aria-hidden="true"></div>
        <div class="flash-layer" aria-hidden="true"></div>
        <div class="vignette" aria-hidden="true"></div>

        <!-- 처음 보이는 화면입니다. -->
        <div id="introPanel" class="intro-panel">
          <p class="status-text">졸음 감지 중</p>
          <h1>졸리세요?</h1>
          <button id="wakeButton" class="primary-button" type="button">
            <span>졸리면 클릭</span>
          </button>
        </div>

        <!-- 버튼 클릭 후 1초 동안 보이는 긴장 화면입니다. -->
        <div id="warningPanel" class="warning-panel" hidden>
          <p>뒤에 누구 있어요</p>
        </div>

        <!-- 귀신 이미지가 나오는 화면입니다. 이미지가 없으면 CSS 대체 화면이 보입니다. -->
        <div id="ghostScene" class="ghost-scene" hidden>
          <img id="ghostImage" src="assets/ghost.png" alt="갑자기 나타난 귀신" />

          <div id="ghostFallback" class="ghost-fallback" hidden>
            <div class="fallback-face" aria-hidden="true">
              <span></span>
              <span></span>
              <b></b>
            </div>
          </div>
        </div>

        <!-- 귀신 등장 2초 뒤에 보이는 마무리 문구와 다시 시작 버튼입니다. -->
        <div id="resultPanel" class="result-panel" hidden>
          <h2>잠은 깼는데<br />영혼도 나감</h2>
          <button id="restartButton" class="secondary-button" type="button">
            다시 시작
          </button>
        </div>

        <!-- 오디오는 사용자가 버튼을 클릭한 뒤에만 재생합니다. -->
        <audio id="screamSound" src="assets/scream.mp3" preload="auto"></audio>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
